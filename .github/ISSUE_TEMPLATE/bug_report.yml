name: Bug report
description: Report a reproducible defect in LottoMind
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug report. Please do not include API keys, personal data, or screenshots containing private information.
  - type: input
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
      placeholder: Short description of the problem
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide a minimal path to reproduce the issue.
      placeholder: |
        1. Open...
        2. Tap...
        3. Observe...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: What actually happened?
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Xcode version, iOS version, device/simulator
      placeholder: Xcode 16.2, iOS 18.2 Simulator
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Redact secrets and personal data before uploading.
