name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Pick simulator
        id: simulator
        shell: bash
        run: |
          set -eo pipefail
          device_name="$(xcrun simctl list devices available | awk -F '[()]' '/iPhone/ {gsub(/^[[:space:]]+|[[:space:]]+$/, "", $1); print $1; exit}')"
          if [[ -z "${device_name}" ]]; then
            echo "No available iPhone simulator found" >&2
            exit 1
          fi
          echo "device=${device_name}" >> "${GITHUB_OUTPUT}"

      - name: Build and test
        shell: bash
        run: |
          set -eo pipefail
          xcodebuild test \
            -project Lottomind/Lottomind.xcodeproj \
            -scheme Lottomind \
            -destination "platform=iOS Simulator,name=${{ steps.simulator.outputs.device }}" \
            CODE_SIGNING_ALLOWED=NO
